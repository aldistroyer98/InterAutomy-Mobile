publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.19.1
  crypto: ^3.0.6
  dio: ^5.9.0
  flutter_riverpod: ^3.0.3
