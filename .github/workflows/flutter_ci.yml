name: Flutter CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Formato, pruebas y APK IA Flutter4
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Obtener código
        uses: actions/checkout@v6

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2.23.0
        with:
          flutter-version: 3.44.6
          channel: stable
          cache: true

      - name: Instalar dependencias
        run: flutter pub get

      - name: Verificar formato
        run: dart format --output=none --set-exit-if-changed .

      - name: Analizar
        run: flutter analyze

      - name: Ejecutar pruebas
        run: flutter test

      - name: Compilar APK Android de depuración
        run: flutter build apk --debug

      - name: Compilar AAB Android de depuración
        run: flutter build appbundle --debug

      - name: Publicar APK IA Flutter5
        uses: actions/upload-artifact@v4
        with:
          name: interautomy-mobile-ia-flutter5-debug
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 7
